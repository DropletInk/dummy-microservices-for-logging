name: Test Local Logging Pipeline

on:
  push:
    branches:
      - ci-test
      - main
  pull_request:

jobs:
  test-local-logging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          docker --version
          docker compose version

      - name: Start local logging agent
        run: |
          cd local-logging/fluent-bit
          docker compose up -d

      - name: Start microservices
        run: |
          docker compose up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Inject logs
        run: bash tests/inject_logs.sh

      - name: Wait for Fluent Bit to collect logs
        run: sleep 10

      - name: Show logs directory
        run: |
          echo "Listing log files..."
          ls -R local-logging/logs || true

      - name: Verify logs
        run: bash tests/verify_local_logs.sh

      - name: Stop containers
        run: |
          docker compose down
          cd local-logging/fluent-bit
          docker compose down