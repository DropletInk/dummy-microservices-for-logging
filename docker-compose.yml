  service-a:
    build: ./services/service-a
    container_name: service-a-test

  service-b:
    build: ./services/service-b
    container_name: service-b-test

  service-c:
    build: ./services/service-c
    container_name: service-c-test

  fluent-bit:
    image: fluent/fluent-bit:3.1.9
    container_name: local-fluent-bit
    network_mode: host
    volumes:
      - ./local-logging/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - ./local-logging/logs:/var/log/fluentbit
    command: -c /fluent-bit/etc/fluent-bit.conf
 
  loki:
    image: grafana/loki:2.9.4
    container_name: loki-test
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
  
  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana-test
    ports:
    - "3000:3000"
    depends_on:
    - loki
