services:
  service-a:
    build: ./service-a
    volumes:
      - ./logs/service-a:/logs
    container_name: service-a
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "tcp://192.168.1.19:2506"
        tag: "service-a"
  service-b:
    build: ./service-b
    volumes:
      - ./logs/service-b:/logs
    container_name: service-b
    logging:
      driver: "fluentd"
      options:
        fluentd-address: "tcp://192.168.1.19:2506"
        tag: "service-b"
  service-c:
    build: ./service-c
    volumes:
      - ./logs/service-c:/logs
    container_name: service-c
    restart: always
    logging:
      driver: "fluentd"
      options:
         fluentd-address: "tcp://192.168.1.19:2506"
         tag: "service-c"
