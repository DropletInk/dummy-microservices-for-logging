name: Test Local Logging Pipeline

on:
  push:
  pull_request:

jobs:
  test-local-logging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Configure Docker daemon for fluentd logging driver
        run: |
          sudo cp local-logging/daemon.json /etc/docker/daemon.json || true
          sudo systemctl restart docker || true
          sleep 15
      
      - name: Start all containers
        run: docker compose up -d --build || true

      - name: Wait for services to be ready
        run: sleep 5
      
      - name: Show Fluent Bit container logs
        run: docker logs local-fluent-bit || true

      - name: Show Central Fluent Bit container logs
        run: docker logs central-fluent-bit
        
      - name: Wait for log files
        run: bash tests/log_files.sh

      - name: Inject logs
        run: bash tests/inject_logs.sh

      - name: Check container logging driver
        run: |
          docker inspect service-a | grep LogConfig -A 5
          
      - name: Wait for Fluent Bit to collect logs
        run: sleep 5

      - name: Show logs directory
        run: |
          echo "Listing log files..."
          ls -R local-logging/logs || true
    
      - name: Verify logs
        run: bash tests/verify_local_logs.sh

      - name: verify central logs
        run: bash tests/verify_central_logs.sh

      - name: Stop microservices
        if: always()
        run: docker compose down || true

      - name: Remove the volumes
        if: always()
        run: docker compose down -v|| true