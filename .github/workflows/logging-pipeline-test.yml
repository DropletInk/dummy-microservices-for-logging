---
name: Local Logging Pipeline Test

on:
  push:
  pull_request:

jobs:
  test-local-logging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Start services
        run: docker compose up -d --build

      - name: Start local logging agent
        run: |
          cd local-logging/fluent-bit
          docker compose up -d

      - name: Wait for services
        run: sleep 10

      - name: Inject logs
        run: bash tests/inject_logs.sh

      - name: Verify logs
        run: bash tests/verify_local_logs.sh

      - name: Stop containers
        run: docker compose down