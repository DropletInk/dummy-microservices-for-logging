name: End To End Logging Pipeline Test

on:
  pull_request:
    branches:
      - develop
    types:
      - opened
      - synchronize

  workflow_run:
    workflows: ["Merge Conflict Detection"]
    types: [completed]

jobs:
  test-complete-logging-pipeline:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Docker daemon
        run: |
          sudo cp logging_pipeline_tests/daemon.json_conf/daemon.json /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 15

      - name: Start all containers
        run: docker compose -f docker-compose.test.yml up -d
        env:
          JWT_SECRET_LOGIN: ${{ secrets.JWT_SECRET_LOGIN }}
          JWT_REFRESH_KEY: ${{ secrets.JWT_REFRESH_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TENANT_ID: ${{ secrets.TENANT_ID }}
          OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_TRACES_ENDPOINT }}

      - name: Wait for the services to be ready
        run: sleep 15

      - name: Check if the services are healthy
        run: bash logging_pipeline_tests/docker_tests/docker_test.sh

      - name: Wait for log files
        run: bash logging_pipeline_tests/log_tests/verify_log_files.sh

      - name: Inject logs into services
        run: bash logging_pipeline_tests/log_tests/inject_logs.sh

      - name: Wait for Fluent Bit to collect logs
        run: sleep 5

      - name: Verify log files
        run: bash logging_pipeline_tests/log_tests/verify_log_files.sh

      - name: Wait for Fluent Bit to collect logs
        run: sleep 15

      - name: Verify Local Fluent-bit logs
        run: bash logging_pipeline_tests/log_tests/verify_local_logs.sh

      - name: Verify Central Fluent-bit logs
        run: bash logging_pipeline_tests/log_tests/verify_central_logs.sh

      - name: Stop micro-services and Remove the volumes
        if: always()
        run: docker compose -f docker-compose.test.yml down -v|| true
